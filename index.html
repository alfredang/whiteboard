<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whiteboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/>
          <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          <path d="M2 2l7.586 7.586"/>
          <circle cx="11" cy="11" r="2"/>
        </svg>
      </div>
      <h1>Whiteboard <span>beta</span></h1>
    </div>

    <div class="toolbar">
      <!-- Tools -->
      <div class="toolbar-group">
        <button class="tool-btn active" id="btnPen" title="Pen (B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
            <path d="m15 5 4 4"/>
          </svg>
        </button>
        <button class="tool-btn" id="btnEraser" title="Eraser (E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/>
            <path d="M22 21H7"/>
            <path d="m5 11 9 9"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Color -->
      <div class="toolbar-group">
        <div class="color-wrapper">
          <div class="color-swatch" id="colorSwatch" style="background: #000000"></div>
          <input type="color" id="colorPicker" value="#000000" title="Color">
        </div>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Brush size -->
      <div class="size-control">
        <input type="range" id="brushSize" min="1" max="50" value="4" title="Size">
        <span class="size-value" id="sizeValue">4px</span>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Undo -->
      <div class="toolbar-group">
        <button class="tool-btn" onclick="undo()" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7v6h6"/>
            <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-danger" onclick="clearCanvas()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
        </svg>
        <span class="label">Clear</span>
      </button>
      <button class="btn btn-accent" onclick="downloadCanvas()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="label">Export</span>
      </button>
    </div>
  </header>

  <div class="canvas-container">
    <canvas id="whiteboard" width="1200" height="700"></canvas>
  </div>

  <div class="status-bar">
    <span class="status-msg" id="statusMsg">Ready</span>
    <span class="status-coords" id="statusCoords">0, 0</span>
  </div>

  <div class="toast" id="toast"></div>

  <script src="whiteboard.js"></script>
</body>
</html>
