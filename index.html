<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whiteboard</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/>
          <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          <path d="M2 2l7.586 7.586"/>
          <circle cx="11" cy="11" r="2"/>
        </svg>
      </div>
      <h1>Whiteboard</h1>
    </div>

    <div class="toolbar">
      <!-- Core tools -->
      <div class="toolbar-group">
        <button class="tool-btn" id="btnSelect" title="Select / Move — drag boxes, double-click to edit (V)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3l7.5 18 2.6-7.9L21 10.5 3 3z"/>
          </svg>
        </button>
        <button class="tool-btn active" id="btnPen" title="Pen (B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
            <path d="m15 5 4 4"/>
          </svg>
        </button>
        <button class="tool-btn" id="btnEraser" title="Eraser (E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/>
            <path d="M22 21H7"/>
            <path d="m5 11 9 9"/>
          </svg>
        </button>
        <button class="tool-btn" id="btnLasso" title="Lasso Select — circle elements to select them (L)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 22a5 5 0 0 1-2-4"/>
            <path d="M3.3 14A6.8 6.8 0 0 1 2 10c0-4.4 4.5-8 10-8s10 3.6 10 8-4.5 8-10 8a12 12 0 0 1-5-1"/>
            <path d="M5 18a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Shapes dropdown -->
      <div class="toolbar-group">
        <div class="dropdown" id="ddShapes">
          <button class="tool-btn dropdown-trigger" id="btnShapes" title="Shapes">
            <svg class="trigger-icon" id="shapesIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="6" width="18" height="12" rx="1"/>
            </svg>
            <span class="caret"></span>
          </button>
          <div class="dropdown-panel palette-panel" id="shapePanel">
            <div class="palette-title">Shapes</div>
            <div class="palette-grid">
              <button class="palette-item" data-tool="rect" title="Rectangle (R)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="1"/></svg>
              </button>
              <button class="palette-item" data-tool="roundrect" title="Rounded rectangle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="4"/></svg>
              </button>
              <button class="palette-item" data-tool="circle" title="Circle / oval (O)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/></svg>
              </button>
              <button class="palette-item" data-tool="triangle" title="Triangle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4 21 19 3 19 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="righttriangle" title="Right triangle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4 5 20 20 20 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="diamond" title="Diamond">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 21 12 12 21 3 12 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="pentagon" title="Pentagon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 21 10 17.5 20.5 6.5 20.5 3 10 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="hexagon" title="Hexagon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4 17 4 22 12 17 20 7 20 2 12 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="star" title="Star">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 14.6 9.2 21 9.6 16 13.8 17.6 20.5 12 16.8 6.4 20.5 8 13.8 3 9.6 9.4 9.2 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="parallelogram" title="Parallelogram">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 6 21 6 17 18 3 18 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="trapezoid" title="Trapezoid">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6 16 6 21 18 3 18 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="line" title="Line (I)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="20" x2="20" y2="4"/></svg>
              </button>
              <button class="palette-item" data-tool="arrow" title="Arrow (A)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="19" y2="12"/><polyline points="14 7 20 12 14 17"/></svg>
              </button>
              <button class="palette-item" data-tool="doublearrow" title="Double arrow">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="9 7 4 12 9 17"/><polyline points="15 7 20 12 15 17"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Process / flowchart dropdown -->
        <div class="dropdown" id="ddProcess">
          <button class="tool-btn dropdown-trigger" id="btnProcess" title="Process / Flowchart">
            <svg class="trigger-icon" id="processIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="6" rx="1"/><rect x="14" y="15" width="7" height="6" rx="1"/><path d="M10 6h4a3 3 0 0 1 3 3v6"/>
            </svg>
            <span class="caret"></span>
          </button>
          <div class="dropdown-panel palette-panel" id="processPanel">
            <div class="palette-title">Flowchart</div>
            <div class="palette-grid">
              <button class="palette-item" data-tool="process" title="Process — drag, then type (P)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="3"/></svg>
              </button>
              <button class="palette-item" data-tool="decision" title="Decision — drag, then type (D)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 21 12 12 21 3 12 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="terminator" title="Start / End — drag, then type (G)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="8" rx="4"/></svg>
              </button>
              <button class="palette-item" data-tool="data" title="Data / input-output">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 6 21 6 17 18 3 18 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="document" title="Document">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5 H20 V16 C16 19 8 13 4 16 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="subroutine" title="Predefined process / subroutine">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="12" rx="1"/><line x1="6.5" y1="6" x2="6.5" y2="18"/><line x1="17.5" y1="6" x2="17.5" y2="18"/></svg>
              </button>
              <button class="palette-item" data-tool="database" title="Database">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 C4 4 20 4 20 6 V18 C20 20 4 20 4 18 Z"/><path d="M4 6 C4 8 20 8 20 6"/></svg>
              </button>
              <button class="palette-item" data-tool="manualinput" title="Manual input">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9 21 5 21 18 3 18 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="preparation" title="Preparation">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5 17 5 22 12 17 19 7 19 2 12 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="offpage" title="Off-page connector">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5 20 5 20 13 12 20 4 13 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="onpage" title="On-page connector">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="7"/></svg>
              </button>
              <button class="palette-item" data-tool="delay" title="Delay">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6 13 6 C20 6 20 18 13 18 L4 18 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="display" title="Display">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 5 17 5 C21 5 21 19 17 19 L7 19 3 12 Z"/></svg>
              </button>
              <button class="palette-item" data-tool="connector" title="Connector — snaps to boxes (C)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="19" y2="12"/><polyline points="14 7 20 12 14 17"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Color palette dropdown -->
      <div class="toolbar-group">
        <div class="dropdown" id="ddColor">
          <button class="tool-btn dropdown-trigger color-trigger" id="btnColor" title="Color">
            <span class="color-swatch" id="colorSwatch" style="background: #111111"></span>
            <span class="caret"></span>
          </button>
          <div class="dropdown-panel color-panel" id="colorPanel">
            <div class="swatch-grid" id="swatchGrid"></div>
            <div class="custom-color-row">
              <span class="custom-color-label">Custom color…</span>
              <label class="custom-color-wheel" title="Custom color">
                <input type="color" id="colorPicker" value="#111111">
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Brush / Eraser size -->
      <div class="size-control">
        <span class="size-label" id="sizeLabel">Pen</span>
        <input type="range" id="brushSize" min="1" max="50" value="4" title="Size">
        <span class="size-value" id="sizeValue">4px</span>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Template dropdown -->
      <div class="toolbar-group">
        <div class="dropdown" id="ddTemplate">
          <button class="tool-btn dropdown-trigger" id="btnTemplate" title="Template">
            <svg class="trigger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            <span class="caret"></span>
          </button>
          <div class="dropdown-panel template-panel" id="templatePanel">
            <div class="palette-title">Template</div>
            <button class="template-item active" data-template="whiteboard">
              <span class="template-preview" style="background:#ffffff"></span>
              <span class="template-label">Whiteboard</span>
            </button>
            <button class="template-item" data-template="blackboard">
              <span class="template-preview" style="background:#16241c"></span>
              <span class="template-label">Blackboard</span>
            </button>
            <button class="template-item" data-template="grid">
              <span class="template-preview tp-grid" style="background:#ffffff"></span>
              <span class="template-label">Grid</span>
            </button>
            <button class="template-item" data-template="dotted">
              <span class="template-preview tp-dots" style="background:#fcfcfc"></span>
              <span class="template-label">Dotted</span>
            </button>
            <button class="template-item" data-template="lined">
              <span class="template-preview tp-lines" style="background:#fffdf5"></span>
              <span class="template-label">Lined</span>
            </button>
          </div>
        </div>
      </div>

      <div class="toolbar-divider"></div>

      <!-- Undo -->
      <div class="toolbar-group">
        <button class="tool-btn" onclick="undo()" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7v6h6"/>
            <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="actions">
      <!-- Add page (icon only) -->
      <button class="tool-btn" id="btnAddPage" title="Add page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="3" width="16" height="18" rx="2"/>
          <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </button>

      <!-- Clear / reset dropdown (icon only) -->
      <div class="dropdown" id="ddReset">
        <button class="tool-btn dropdown-trigger" id="btnReset" title="Clear / reset">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          </svg>
          <span class="caret"></span>
        </button>
        <div class="dropdown-panel menu-panel align-right" id="resetPanel">
          <button class="menu-item" data-reset="current">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="8" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="8" y2="15"/></svg>
            Clear current page
          </button>
          <button class="menu-item" data-reset="all">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="3" width="14" height="14" rx="2"/><path d="M3 7v12a2 2 0 0 0 2 2h12"/><line x1="11" y1="8" x2="17" y2="12"/><line x1="17" y1="8" x2="11" y2="12"/></svg>
            Clear all pages
          </button>
          <button class="menu-item danger" data-reset="delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            Delete all pages
          </button>
        </div>
      </div>

      <button class="btn btn-accent" onclick="exportPDF()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <polyline points="9 15 12 18 15 15"/>
        </svg>
        <span class="label">Export PDF</span>
      </button>
    </div>
  </header>

  <!-- Page Strip -->
  <div class="page-strip" id="pageStrip">
    <span class="page-strip-label">Pages</span>
    <div class="page-strip-inner" id="pageStripInner">
      <!-- Page thumbnails inserted by JS -->
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="whiteboard" width="1200" height="700"></canvas>
    <textarea id="shapeTextEditor" class="shape-text-editor" spellcheck="false"
              placeholder="Type label… (Enter to confirm)"></textarea>
    <div id="eraserCursor" class="eraser-ring"></div>
  </div>

  <div class="status-bar">
    <span class="status-msg" id="statusMsg">Ready</span>
    <span class="status-footer">Powered by <a href="https://www.tertiarycourses.com.sg/" target="_blank" rel="noopener noreferrer">Tertiary Infotech Academy Pte Ltd</a></span>
    <span class="status-coords" id="statusCoords">0, 0</span>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
  <script src="whiteboard.js?v=16"></script>
</body>
</html>
